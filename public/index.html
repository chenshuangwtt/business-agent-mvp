<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Agent MVP</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef1f5;
        --card: #ffffff;
        --text: #111827;
        --muted: #64748b;
        --border: #d9e2ec;
        --accent: #2563eb;
        --accent-bg: #eff6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100%, 760px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        color: var(--accent);
        background: var(--accent-bg);
        font-size: 12px;
        font-weight: 750;
      }

      h1 {
        margin: 16px 0 10px;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 24px;
      }

      .item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        background: #fbfdff;
      }

      .item strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      code {
        display: block;
        overflow-x: auto;
        margin-top: 8px;
        padding: 10px;
        border-radius: 8px;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre;
      }

      a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      @media (max-width: 640px) {
        main {
          padding: 22px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Fallback 页面</span>
      <h1>Business Agent MVP</h1>
      <p>
        这是后端静态托管的轻量提示页。完整工作台 UI 位于
        <code>frontend/dist</code>
        ，构建后 Express 会优先提供 Vue 版本。
      </p>

      <div class="grid">
        <section class="item">
          <strong>构建完整前端</strong>
          <p>生成 Vue 工作台页面。</p>
          <code>npm run build:ui</code>
        </section>
        <section class="item">
          <strong>启动开发 UI</strong>
          <p>Vite 代理 API 到后端 3001。</p>
          <code>pnpm --dir frontend run dev -- --host 0.0.0.0</code>
        </section>
        <section class="item">
          <strong>健康检查</strong>
          <p><a href="/api/health">/api/health</a></p>
        </section>
        <section class="item">
          <strong>工具列表</strong>
          <p><a href="/api/tools">/api/tools</a></p>
        </section>
      </div>
    </main>
  </body>
</html>
